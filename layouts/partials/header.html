<a href="{{ .Site.BaseURL }}" class="site-title">{{ site.Title }}</a>
<nav aria-label="Main navigation">
  <ul>
    {{- range site.Menus.main }}
    <li>
      <a href="{{ .URL }}"
        {{- if $.Page.IsMenuCurrent "main" . }} class="active" aria-current="page"
        {{- else if $.Page.HasMenuCurrent "main" . }} class="ancestor" aria-current="true"
        {{- end }}>{{ .Name }}</a>
    </li>
    {{- end }}
  </ul>
</nav>
