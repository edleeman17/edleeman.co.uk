<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Flash-free theme detection - runs before CSS loads -->
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <!-- COMMON TAGS -->
  <title>{{ .Title }}</title>
  <link rel="apple-touch-icon" sizes="180x180" href="{{ .Site.BaseURL }}images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ .Site.BaseURL }}images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ .Site.BaseURL }}images/favicon-16x16.png">
  <!-- Search Engine -->
  <meta name="description" content="{{ .Description }}">
  <meta name="image" content="{{ $.Param "image" }}">
  <!-- Schema.org for Google -->
  <meta itemprop="name" content="{{ .Title }}">
  <meta itemprop="description" content="{{ .Description }}">
  <meta itemprop="image" content="{{ .Site.BaseURL}}{{ $.Param "image" }}">
  <!-- Open Graph general (Facebook, Pinterest & Google+) -->
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Description }}">
  {{ if $.Param "image" }}
  <meta property="og:image" content="{{ .Site.BaseURL}}{{ $.Param "image" }}">
  {{ end }}
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Title }}">
  <meta property="og:type" content="article">
  <!-- Open Graph - Article -->
  <meta property="article:tag" content="{{ range .Params.tags }}{{.}} {{end}}">
  <meta name="fediverse:creator" content="@edphones@fosstodon.org">
  <link rel="stylesheet" type="text/css" href="{{ .Site.BaseURL }}css/main.css?v={{ now.Unix }}">
  <link rel="stylesheet" type="text/css" href="{{ .Site.BaseURL }}css/syntax.css?v={{ now.Unix }}">

  <link rel="alternate" type="application/rss+xml" href="{{.Site.BaseURL }}index.xml" title="{{ .Site.Title }}">

  <!-- iine like buttons -->
  <script src="https://cdn.jsdelivr.net/gh/welpo/iine@main/iine.mini.js" defer></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />

  <!-- Plausible Analytics -->
  <script defer data-domain="edleeman.co.uk" src="https://clicks.bowlerdesign.co.uk/js/script.js"></script>
</head>

<body>

<header>
  <!-- Homepage Logo -->
  <a href="{{ .Site.BaseURL }}" class="logo"><img src="{{ .Site.BaseURL }}images/ed.png" alt="Home" height="32"></a>

  <!-- Mobile hamburger toggle -->
  <input type="checkbox" id="nav-toggle" class="nav-toggle">
  <label for="nav-toggle" class="nav-toggle-label">
    <span></span>
  </label>

  <!-- Navigation Pages -->
  <nav class="nav-links">
    {{ range where site.RegularPages "Type" "page" }}
    <a class="menu-item{{ if eq $.Page.Permalink .Permalink }} active{{ end }}" href="{{ .Permalink }}">{{ .Title }}</a>
    {{ end }}
    <a class="menu-item{{ if eq $.Page.RelPermalink "/archive/" }} active{{ end }}" href="{{ .Site.BaseURL }}archive">archive</a>
  </nav>

  <div class="right-wrap">
    <button id="button">dark</button>
    <!-- Show RSS feed in the header -->
    <a href="{{ .Site.BaseURL }}index.xml"><strong><svg xmlns="http://www.w3.org/2000/svg" width="16"
      height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round" class="feather feather-rss">
      <path d="M4 11a9 9 0 0 1 9 9"></path>
      <path d="M4 4a16 16 0 0 1 16 16"></path>
      <circle cx="5" cy="19" r="1"></circle>
    </svg></strong></a>
  </div>
</header>
