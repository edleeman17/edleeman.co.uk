<script>
    // Theme toggle (vanilla JS with system preference support)
    (function() {
      var btn = document.getElementById('button');
      var html = document.documentElement;

      function updateButtonText() {
        btn.textContent = html.classList.contains('dark') ? 'light' : 'dark';
      }

      // Initial button state
      updateButtonText();

      // Toggle handler
      btn.addEventListener('click', function() {
        var isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        updateButtonText();
      });

      // Listen for system preference changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        // Only auto-switch if user hasn't manually set a preference
        if (!localStorage.getItem('theme')) {
          if (e.matches) {
            html.classList.add('dark');
          } else {
            html.classList.remove('dark');
          }
          updateButtonText();
        }
      });
    })();

    // Smooth scroll for TOC links (vanilla JS)
    document.querySelectorAll('.sticky-toc-link').forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.querySelector(this.getAttribute('href'));
        if (target) {
          var offset = target.getBoundingClientRect().top + window.pageYOffset - 82;
          window.scrollTo({ top: offset, behavior: 'smooth' });
        }
      });
    });

    // Code block copy button
    document.querySelectorAll('.highlight').forEach(function(block) {
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'copy';
      btn.addEventListener('click', function() {
        var code = block.querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(function() {
          btn.textContent = 'copied!';
          btn.classList.add('copied');
          setTimeout(function() {
            btn.textContent = 'copy';
            btn.classList.remove('copied');
          }, 2000);
        });
      });
      block.appendChild(btn);
    });

    // Keyboard navigation (j/k for posts)
    (function() {
      var posts = document.querySelectorAll('.feed');
      if (!posts.length) return;
      var current = -1;
      document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'j') {
          current = Math.min(current + 1, posts.length - 1);
          posts[current].scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else if (e.key === 'k') {
          current = Math.max(current - 1, 0);
          posts[current].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
    })();
</script>
