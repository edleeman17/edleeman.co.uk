<div class="webmentions" id="webmentions"></div>

<script>
(function() {
  var container = document.getElementById('webmentions');
  var target = encodeURIComponent(window.location.href);
  fetch('https://webmention.io/api/mentions.jf2?target=' + target + '&per-page=100')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var children = (data && data.children) || [];
      if (!children.length) return;

      var likes    = children.filter(function(m) { return m['wm-property'] === 'like-of'; });
      var reposts  = children.filter(function(m) { return m['wm-property'] === 'repost-of'; });
      var replies  = children.filter(function(m) {
        return m['wm-property'] === 'in-reply-to' || m['wm-property'] === 'mention-of';
      });

      var html = '<div class="wm-section">';

      if (likes.length || reposts.length) {
        html += '<p class="wm-counts">';
        if (likes.length)   html += '<span><i class="fas fa-heart"></i> ' + likes.length + '</span>';
        if (reposts.length) html += '<span><i class="fas fa-retweet"></i> ' + reposts.length + '</span>';
        html += '</p>';
        var avatars = likes.concat(reposts);
        html += '<div class="wm-avatars">';
        avatars.forEach(function(m) {
          var photo = m.author && m.author.photo ? m.author.photo : '';
          var name  = m.author && m.author.name  ? m.author.name  : 'Someone';
          var url   = m.url || m['wm-source'] || '#';
          html += '<a href="' + url + '" title="' + name + '" target="_blank" rel="noopener">';
          if (photo) {
            html += '<img src="' + photo + '" alt="' + name + '" class="wm-avatar" loading="lazy">';
          } else {
            html += '<span class="wm-avatar wm-avatar-fallback">' + name.charAt(0) + '</span>';
          }
          html += '</a>';
        });
        html += '</div>';
      }

      if (replies.length) {
        var byUrl = {};
        replies.forEach(function(m) { byUrl[m.url] = m; m._children = []; });
        var roots = [];
        replies.forEach(function(m) {
          var rt = m['in-reply-to'];
          var parentUrl = Array.isArray(rt) ? rt[0] : rt;
          if (parentUrl && typeof parentUrl === 'object') parentUrl = parentUrl.url;
          if (parentUrl && byUrl[parentUrl]) {
            byUrl[parentUrl]._children.push(m);
          } else {
            roots.push(m);
          }
        });
        function renderReply(m, depth) {
          var author = m.author || {};
          var photo  = author.photo || '';
          var name   = author.name  || 'Anonymous';
          var url    = m.url || m['wm-source'] || '#';
          var text   = m.content && m.content.text ? m.content.text : '';
          var date   = m.published ? new Date(m.published).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
          var indent = depth > 0 ? ' style="margin-left:' + (depth * 1.5) + 'rem;border-left:2px solid var(--color-border);padding-left:1rem;"' : '';
          var out = '<div class="wm-reply"' + indent + '>';
          out += '<div class="wm-reply-meta">';
          if (photo) out += '<img src="' + photo + '" alt="' + name + '" class="wm-avatar" loading="lazy">';
          out += '<a href="' + url + '" target="_blank" rel="noopener" class="wm-reply-author">' + name + '</a>';
          if (date) out += '<span class="wm-reply-date">' + date + '</span>';
          out += '</div>';
          if (text) out += '<p class="wm-reply-text">' + text + '</p>';
          m._children.forEach(function(child) { out += renderReply(child, depth + 1); });
          out += '</div>';
          return out;
        }
        html += '<div class="wm-replies">';
        roots.forEach(function(m) { html += renderReply(m, 0); });
        html += '</div>';
      }

      html += '</div>';
      container.innerHTML = html;
    })
    .catch(function() {});
})();
</script>
