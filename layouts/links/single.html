{{- partial "header.html" . -}}

<style>
  .link-single {
    max-width: 640px;
  }

  .link-single-meta {
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-4);
  }

  .link-single-description {
    font-size: var(--text-base);
    color: var(--color-text);
    line-height: 1.6;
    margin-bottom: var(--space-6);
  }

  .link-single-url {
    display: inline-block;
    font-weight: 600;
    color: var(--color-accent);
    text-decoration: none;
  }

  .link-single-url:hover {
    text-decoration: underline;
  }

  .link-single-url::after {
    content: ' ↗';
    font-size: var(--text-sm);
  }

  .back-link {
    display: inline-block;
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    text-decoration: none;
    margin-bottom: var(--space-6);
  }

  .back-link:hover {
    color: var(--color-text);
  }

  .email-link {
    display: inline-block;
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    text-decoration: none;
    margin-top: var(--space-4);
  }

  .email-link:hover {
    color: var(--color-text);
    text-decoration: underline;
  }
</style>

<article class="main link-single h-entry">
  <a href="/links/" class="back-link">← Links</a>
  <h1 class="p-name">{{ .Title }}</h1>
  <a class="u-url" href="{{ .Permalink }}" style="display:none;"></a>
  <div class="link-single-meta"><time class="dt-published" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "2 January 2006" }}</time></div>
  {{ with .Params.description }}<p class="link-single-description p-summary">{{ . }}</p>{{ end }}
  {{ with .Params.link }}<a class="u-bookmark-of link-single-url" href="{{ . }}" target="_blank" rel="noopener noreferrer">Visit link</a>{{ end }}
  <br>
  <a href="mailto:hello@edleeman.co.uk?subject={{ .Title | urlquery }}&body={{ printf "Re: %s\n\n" .Permalink | urlquery }}" class="email-link">Email me about this</a>
</article>

{{- partial "footer.html" . -}}
