{{ define "main" }}
<div class="main prose-wrap">
  <h1 class="p-name">Keyboard</h1>
  <p class="kb-desc">Ferris Sweep &middot; 34 keys &middot; 3 layers</p>

  <div class="kb-controls">
    <div class="kb-tabs" role="tablist" aria-label="Keyboard layers">
      <button class="kb-tab is-active" data-layer="0" role="tab" aria-selected="true">Base</button>
      <button class="kb-tab" data-layer="1" role="tab" aria-selected="false">Nav &amp; Media</button>
      <button class="kb-tab" data-layer="2" role="tab" aria-selected="false">Symbols &amp; F-keys</button>
    </div>
    <div class="kb-controls-right">
      <button class="kb-shift-btn" id="kb-shift-btn" aria-pressed="false">&#x21E7; Shift</button>
      <a href="/ferris-sweep.vil" download class="kb-dl">&darr; Download .vil</a>
    </div>
  </div>

  <div class="kb-legend">
    <span><span class="kb-legend-key">Key</span> tap</span>
    <span class="kb-legend-sep">&middot;</span>
    <span><span class="kb-legend-hold">hold</span> hold modifier</span>
    <span class="kb-legend-sep">&middot;</span>
    <span style="opacity:.4">&#9661;</span> transparent
    <span class="kb-legend-sep">&middot;</span>
    <span>click <span class="kb-legend-hold">layer N</span> to switch layer</span>
  </div>

  <div class="kb-board-wrap">
    <div class="kb-board" id="kb-board" role="img" aria-label="Keyboard layout"></div>
  </div>
</div>

<style>
.kb-desc {
  color: var(--muted);
  font-size: var(--text-sm);
  margin-top: -0.75rem;
  margin-bottom: 1.5rem;
}
.kb-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.kb-tabs { display: flex; gap: 0.375rem; flex-wrap: wrap; }
.kb-tab {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 3px solid hsl(0 0% 75%);
  border-radius: 4px;
  padding: 0.375rem 0.875rem;
  font: inherit;
  font-size: var(--text-sm);
  color: var(--muted);
  cursor: pointer;
  transition: background 150ms, color 150ms;
}
.kb-tab:hover { background: var(--bg3); color: var(--text); }
.kb-tab.is-active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  border-bottom-color: hsl(0 0% 20%);
}
.kb-controls-right { display: flex; gap: 0.5rem; align-items: center; }
.kb-shift-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 3px solid hsl(0 0% 75%);
  border-radius: 4px;
  padding: 0.375rem 0.875rem;
  font: inherit;
  font-size: var(--text-sm);
  color: var(--muted);
  cursor: pointer;
  transition: background 150ms, color 150ms;
}
.kb-shift-btn:hover { background: var(--bg3); color: var(--text); }
.kb-shift-btn.is-active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  border-bottom-color: hsl(0 0% 20%);
}
.kb-dl {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 3px solid hsl(0 0% 75%);
  border-radius: 4px;
  padding: 0.375rem 0.875rem;
  font: inherit;
  font-size: var(--text-sm);
  color: var(--text);
  text-decoration: none;
  transition: background 150ms;
  white-space: nowrap;
}
.kb-dl:hover { background: var(--bg3); }
.kb-legend {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: var(--text-xs);
  color: var(--muted);
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.kb-legend-key {
  display: inline-block;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 2px solid hsl(0 0% 75%);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text);
}
.kb-legend-hold {
  display: inline-block;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 1px 4px;
  font-size: 0.65rem;
  color: var(--muted);
}
.kb-legend-sep { color: var(--border); }

.kb-board-wrap { overflow-x: auto; padding-bottom: 2rem; }
.kb-board {
  display: flex;
  align-items: flex-end;
  gap: 0;
  width: max-content;
}

/* PCB halves — background drawn by JS SVG to match key silhouette */
.kb-half {
  padding: 12px 16px 28px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
}
.kb-bg-svg { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; z-index: -1; }

/* Gap between halves */
.kb-cable-gap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 2rem;
  flex-shrink: 0;
}

.kb-cols {
  display: flex;
  flex-direction: row;
  gap: 4px;
  align-items: flex-start;
}
.kb-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kb-thumb-row {
  display: flex;
  gap: 4px;
  padding-top: 4px;
  overflow: visible;
}

/* Keys — white keycaps */
.kb-key {
  width: 52px;
  height: 52px;
  background: hsl(0 0% 94%);
  border: 1px solid hsl(0 0% 76%);
  border-bottom: 3px solid hsl(0 0% 60%);
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px;
  box-sizing: border-box;
  transition: background 150ms, border-bottom-width 80ms, transform 80ms;
  cursor: default;
  flex-shrink: 0;
  overflow: hidden;
  color: hsl(0 0% 12%);
}
.kb-key:hover {
  background: hsl(0 0% 86%);
  border-bottom-width: 1px;
  transform: translateY(2px);
}
.kb-key.is-trns { opacity: 0.28; }
.kb-key.is-empty { visibility: hidden; }
.kb-key.has-hold { justify-content: space-between; padding: 6px 4px 5px; }
.kb-key.is-layer-key { cursor: pointer; }
.kb-key.is-layer-key:hover { background: hsl(220 60% 88%); border-color: hsl(220 40% 70%); }
.kb-key.is-shift-key { cursor: pointer; }
.kb-key.is-shift-active {
  background: hsl(45 90% 80%);
  border-color: hsl(45 70% 62%);
  border-bottom-color: hsl(45 70% 46%);
}
.kb-key.is-shift-active .kb-tap { color: hsl(0 0% 10%); }
.kb-key.is-shift-active .kb-hold { color: hsl(0 0% 35%); border-color: hsl(0 0% 55%); }

.kb-tap {
  font-size: var(--text-sm);
  font-weight: 600;
  line-height: 1;
  text-align: center;
  color: hsl(0 0% 12%);
}
.kb-key.is-trns .kb-tap { font-weight: 400; }
.kb-hold {
  font-size: 0.6rem;
  color: hsl(0 0% 42%);
  line-height: 1;
  border: 1px solid hsl(0 0% 72%);
  border-radius: 2px;
  padding: 1px 3px;
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Right half: keys flush right within PCB */
.kb-half.kb-right { align-items: flex-end; }
.kb-half.kb-right .kb-component-bar { width: 100%; }

.kb-thumb-spacer {
  flex-shrink: 0;
  width: 220px;
}
</style>

<script>
const LAYERS = [
  [
    ["RALT_T(KC_Q)","KC_W","KC_E","KC_R","KC_T"],
    ["MEH_T(KC_A)","KC_S","KC_D","KC_F","KC_G"],
    ["LCTL_T(KC_Z)","KC_X","KC_C","KC_V","KC_B"],
    ["LSFT_T(KC_SPACE)","LT1(KC_GRAVE)",-1,-1,-1],
    ["KC_Y","KC_U","KC_I","KC_O","KC_P"],
    ["KC_H","KC_J","KC_K","KC_L","KC_SCOLON"],
    ["KC_N","KC_M","KC_COMMA","KC_DOT","KC_SLASH"],
    ["LT2(KC_BSPACE)","LGUI_T(KC_TAB)",-1,-1,-1]
  ],
  [
    ["KC_1","KC_2","KC_3","KC_4","KC_5"],
    ["KC_GESC","KC_MPRV","KC_MPLY","KC_MNXT","KC_HOME"],
    ["KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS","KC_END"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1],
    ["KC_6","KC_7","KC_8","KC_9","KC_0"],
    ["KC_LEFT","KC_DOWN","KC_UP","KC_RIGHT","KC_QUOTE"],
    ["KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS","KC_ENTER"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1]
  ],
  [
    ["KC_F1","KC_F2","KC_F3","KC_F4","KC_F5"],
    ["KC_TAB","KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS"],
    ["KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1],
    ["KC_F6","KC_F7","KC_F8","KC_F9","KC_F10"],
    ["KC_MINUS","KC_EQUAL","KC_LBRACKET","KC_RBRACKET","LSFT(KC_BSLASH)"],
    ["LSFT(KC_MINUS)","LSFT(KC_EQUAL)","KC_TRNS","KC_TRNS","KC_BSLASH"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1]
  ]
];

const KC_MAP = {
  'KC_SPACE': 'Space', 'KC_BSPACE': '⌫', 'KC_ENTER': '↵',
  'KC_TAB': 'Tab', 'KC_ESC': 'Esc', 'KC_GESC': 'Esc/`',
  'KC_GRAVE': '`', 'KC_SCOLON': ';', 'KC_COMMA': ',',
  'KC_DOT': '.', 'KC_SLASH': '/', 'KC_BSLASH': '\\',
  'KC_QUOTE': "'", 'KC_MINUS': '-', 'KC_EQUAL': '=',
  'KC_LBRACKET': '[', 'KC_RBRACKET': ']',
  'KC_LEFT': '←', 'KC_RIGHT': '→', 'KC_UP': '↑', 'KC_DOWN': '↓',
  'KC_HOME': 'Home', 'KC_END': 'End', 'KC_PGUP': 'PgUp', 'KC_PGDN': 'PgDn',
  'KC_MPRV': '⏮', 'KC_MPLY': '⏯', 'KC_MNXT': '⏭',
  'KC_MUTE': '🔇', 'KC_VOLU': '🔊', 'KC_VOLD': '🔉',
  'KC_DEL': 'Del', 'KC_INS': 'Ins', 'KC_CAPS': 'Caps',
  'KC_LSFT': '⇧', 'KC_RSFT': '⇧', 'KC_LCTL': 'Ctrl', 'KC_RCTL': 'Ctrl',
  'KC_LALT': '⌥', 'KC_RALT': 'RAlt', 'KC_LGUI': '⌘', 'KC_RGUI': '⌘',
};
const MOD_LABELS = {
  'LSFT_T': '⇧ shift', 'LCTL_T': 'ctrl', 'RALT_T': 'ralt',
  'MEH_T': 'meh', 'LGUI_T': '⌘ cmd', 'LALT_T': '⌥ opt',
};

const LEFT_STAGGER  = [52, 26, 0, 16, 36];
const RIGHT_STAGGER = [36, 16, 0, 26, 52];
const LEFT_THUMB_TRANSFORMS  = [[10, -19], [20, 0]];   // Space (outer), LT1 (inner)
const RIGHT_THUMB_TRANSFORMS = [[-20, 0], [-10, -19]]; // LT2 (inner), Tab (outer)

const SHIFT_MAP = {
  '1':'!','2':'@','3':'#','4':'$','5':'%',
  '6':'^','7':'&','8':'*','9':'(','0':')',
  ';':':',',':'<','.':'>','/':'?','\\':'|',
  "'":'"','-':'_','=':'+','[':'{',']':'}','`':'~',
};

let shiftActive = false;
let currentLayer = 0;

function parseKey(code) {
  if (code === -1 || code === 'KC_NO') return { tap: '', empty: true };
  if (code === 'KC_TRNS') return { tap: '▽', trns: true };
  const shifted = code.match(/^LSFT\((.+)\)$/);
  if (shifted) { const i = parseKey(shifted[1]); return { tap: '⇧' + i.tap }; }
  const modtap = code.match(/^(LSFT_T|LCTL_T|RALT_T|MEH_T|LGUI_T|LALT_T)\((.+)\)$/);
  if (modtap) { const i = parseKey(modtap[2]); return { tap: i.tap, hold: MOD_LABELS[modtap[1]] || modtap[1], isShift: modtap[1] === 'LSFT_T' }; }
  const lt = code.match(/^LT(\d+)\((.+)\)$/);
  if (lt) { const i = parseKey(lt[2]); return { tap: i.tap, hold: 'layer ' + lt[1], isLayerTap: true, layerNum: parseInt(lt[1], 10) }; }
  if (KC_MAP[code]) return { tap: KC_MAP[code] };
  if (code.startsWith('KC_')) return { tap: code.slice(3) };
  return { tap: code };
}

function applyShift(tap) {
  if (tap.startsWith('⇧')) return tap;
  return SHIFT_MAP[tap] !== undefined ? SHIFT_MAP[tap] : tap;
}

function switchLayer(idx) {
  currentLayer = idx;
  document.querySelectorAll('.kb-tab').forEach(b => {
    const active = parseInt(b.dataset.layer, 10) === idx;
    b.classList.toggle('is-active', active);
    b.setAttribute('aria-selected', String(active));
  });
  renderLayer(idx);
}

function makeKey(code, thumbTransform) {
  const k = parseKey(String(code));
  const el = document.createElement('div');
  el.className = 'kb-key';
  el.title = String(code);

  if (thumbTransform) {
    const [rot, ty] = thumbTransform;
    el.style.transform = `rotate(${rot}deg) translateY(${ty}px)`;
    el.style.transformOrigin = 'center bottom';
    el.style.flexShrink = '0';
  }

  if (k.empty) { el.classList.add('is-empty'); return el; }
  if (k.trns)  { el.classList.add('is-trns'); }
  if (k.hold)  { el.classList.add('has-hold'); }

  if (k.isShift) {
    el.classList.add('is-shift-key');
    if (shiftActive) el.classList.add('is-shift-active');
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      shiftActive = !shiftActive;
      const btn = document.getElementById('kb-shift-btn');
      btn.classList.toggle('is-active', shiftActive);
      btn.setAttribute('aria-pressed', String(shiftActive));
      renderLayer(currentLayer);
    });
  }

  if (k.isLayerTap) {
    el.classList.add('is-layer-key');
    el.addEventListener('click', () => switchLayer(k.layerNum));
  }

  const tap = document.createElement('span');
  tap.className = 'kb-tap';
  tap.textContent = (shiftActive && !k.trns && !k.isShift) ? applyShift(k.tap) : k.tap;
  el.appendChild(tap);

  if (k.hold) {
    const hold = document.createElement('span');
    hold.className = 'kb-hold';
    hold.textContent = k.hold;
    el.appendChild(hold);
  }

  return el;
}

function makeHalf(rows, stagger) {
  const cols = document.createElement('div');
  cols.className = 'kb-cols';
  for (let c = 0; c < 5; c++) {
    const col = document.createElement('div');
    col.className = 'kb-col';
    col.style.paddingTop = stagger[c] + 'px';
    for (let r = 0; r < 3; r++) col.appendChild(makeKey(rows[r][c]));
    cols.appendChild(col);
  }
  return cols;
}


function drawHalfBackground(halfEl) {
  const old = halfEl.querySelector('.kb-bg-svg');
  if (old) old.remove();

  const ns = 'http://www.w3.org/2000/svg';
  const PCB = 'hsl(220 15% 12%)';
  const R = 8;
  const PAD = 6;

  const hr = halfEl.getBoundingClientRect();
  const ox = hr.left, oy = hr.top;

  function rel(r) { return { x: r.left - ox, y: r.top - oy, w: r.width, h: r.height }; }

  function mkRect(x, y, w, h, rx) {
    const el = document.createElementNS(ns, 'rect');
    el.setAttribute('x', x); el.setAttribute('y', y);
    el.setAttribute('width', Math.max(0, w)); el.setAttribute('height', Math.max(0, h));
    if (rx) el.setAttribute('rx', rx);
    el.setAttribute('fill', PCB);
    return el;
  }

  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', hr.width);
  svg.setAttribute('height', hr.height);
  svg.setAttribute('viewBox', `0 0 ${hr.width} ${hr.height}`);
  svg.setAttribute('overflow', 'visible');
  svg.classList.add('kb-bg-svg');

  // Column rects — from top down to last key bottom
  const colBot0 = -PAD;
  Array.from(halfEl.querySelectorAll('.kb-col')).forEach(col => {
    const cr = rel(col.getBoundingClientRect());
    const keys = Array.from(col.querySelectorAll('.kb-key'));
    const last = keys[keys.length - 1];
    const lr = rel(last.getBoundingClientRect());
    svg.appendChild(mkRect(cr.x - PAD / 2, colBot0, cr.w + PAD, (lr.y + lr.h + PAD) - colBot0, 0));
  });

  // Thumb keys — rotated rects matching key transform
  Array.from(halfEl.querySelectorAll('.kb-thumb-row .kb-key:not(.is-empty)')).forEach(key => {
    const kr = rel(key.getBoundingClientRect());
    const cx = kr.x + kr.w / 2;
    const cy = kr.y + kr.h / 2;
    const m = (key.style.transform || '').match(/rotate\(([-\d.]+)deg\)/);
    const angle = m ? parseFloat(m[1]) : 0;
    const sz = 52 + PAD * 2;
    const g = document.createElementNS(ns, 'g');
    g.setAttribute('transform', `rotate(${angle},${cx},${cy})`);
    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', cx - sz / 2); r.setAttribute('y', cy - sz / 2);
    r.setAttribute('width', sz); r.setAttribute('height', sz);
    r.setAttribute('rx', R); r.setAttribute('fill', PCB);
    g.appendChild(r);
    svg.appendChild(g);
  });

  halfEl.insertBefore(svg, halfEl.firstChild);
}

function renderLayer(idx) {
  currentLayer = idx;
  const data = LAYERS[idx];
  const board = document.getElementById('kb-board');
  board.innerHTML = '';

  // Left half
  const left = document.createElement('div');
  left.className = 'kb-half kb-left';
  left.appendChild(makeHalf([data[0], data[1], data[2]], LEFT_STAGGER));
  const leftThumb = document.createElement('div');
  leftThumb.className = 'kb-thumb-row';
  const lSpacer = document.createElement('div');
  lSpacer.className = 'kb-thumb-spacer';
  leftThumb.appendChild(lSpacer);
  leftThumb.appendChild(makeKey(data[3][0], LEFT_THUMB_TRANSFORMS[0]));
  leftThumb.appendChild(makeKey(data[3][1], LEFT_THUMB_TRANSFORMS[1]));
  left.appendChild(leftThumb);
  board.appendChild(left);

  // Cable gap
  const gap = document.createElement('div');
  gap.className = 'kb-cable-gap';
  board.appendChild(gap);

  // Right half
  const right = document.createElement('div');
  right.className = 'kb-half kb-right';
  right.appendChild(makeHalf([data[4], data[5], data[6]], RIGHT_STAGGER));
  const rightThumb = document.createElement('div');
  rightThumb.className = 'kb-thumb-row';
  rightThumb.appendChild(makeKey(data[7][0], RIGHT_THUMB_TRANSFORMS[0]));
  rightThumb.appendChild(makeKey(data[7][1], RIGHT_THUMB_TRANSFORMS[1]));
  const rSpacer = document.createElement('div');
  rSpacer.className = 'kb-thumb-spacer';
  rightThumb.appendChild(rSpacer);
  right.appendChild(rightThumb);
  board.appendChild(right);

  requestAnimationFrame(() => {
    board.querySelectorAll('.kb-half').forEach(drawHalfBackground);
  });
}

document.querySelectorAll('.kb-tab').forEach(btn => {
  btn.addEventListener('click', () => switchLayer(parseInt(btn.dataset.layer, 10)));
});

document.getElementById('kb-shift-btn').addEventListener('click', () => {
  shiftActive = !shiftActive;
  const btn = document.getElementById('kb-shift-btn');
  btn.classList.toggle('is-active', shiftActive);
  btn.setAttribute('aria-pressed', String(shiftActive));
  renderLayer(currentLayer);
});

renderLayer(0);
</script>
{{ end }}
