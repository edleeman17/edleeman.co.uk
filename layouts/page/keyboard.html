{{ define "main" }}
<div class="main prose-wrap">
  <h1 class="p-name">Keyboard</h1>
  <p class="kb-desc">Ferris Sweep &middot; RP2040 Pro Micro &middot; Vial firmware &middot; 3 layers</p>

  <div class="kb-controls">
    <div class="kb-tabs" role="tablist" aria-label="Keyboard layers">
      <button class="kb-tab is-active" data-layer="0" role="tab" aria-selected="true">Base</button>
      <button class="kb-tab" data-layer="1" role="tab" aria-selected="false">Nav &amp; Media</button>
      <button class="kb-tab" data-layer="2" role="tab" aria-selected="false">Symbols &amp; F-keys</button>
    </div>
    <div class="kb-controls-right">
      <button class="kb-shift-btn" id="kb-shift-btn" aria-pressed="false">&#x21E7; Shift</button>
      <a href="/ferris-sweep.vil" download class="kb-dl">&darr; Download .vil</a>
    </div>
  </div>

  <div class="kb-legend">
    <span><span class="kb-legend-key">Key</span> tap</span>
    <span class="kb-legend-sep">&middot;</span>
    <span><span class="kb-legend-hold">hold</span> hold modifier</span>
    <span class="kb-legend-sep">&middot;</span>
    <span style="opacity:.4">&#9661;</span> transparent
    <span class="kb-legend-sep">&middot;</span>
    <span>click <span class="kb-legend-hold">layer N</span> to switch layer</span>
  </div>

  <div class="kb-board-wrap">
    <div class="kb-board" id="kb-board" role="img" aria-label="Keyboard layout"></div>
  </div>
</div>

<style>
.kb-desc {
  color: var(--muted);
  font-size: var(--text-sm);
  margin-top: -0.75rem;
  margin-bottom: 1.5rem;
}
.kb-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.kb-tabs { display: flex; gap: 0.375rem; flex-wrap: wrap; }
.kb-tab {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 3px solid hsl(0 0% 75%);
  border-radius: 4px;
  padding: 0.375rem 0.875rem;
  font: inherit;
  font-size: var(--text-sm);
  color: var(--muted);
  cursor: pointer;
  transition: background 150ms, color 150ms;
}
.kb-tab:hover { background: var(--bg3); color: var(--text); }
.kb-tab.is-active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  border-bottom-color: hsl(0 0% 20%);
}
.kb-controls-right { display: flex; gap: 0.5rem; align-items: center; }
.kb-shift-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 3px solid hsl(0 0% 75%);
  border-radius: 4px;
  padding: 0.375rem 0.875rem;
  font: inherit;
  font-size: var(--text-sm);
  color: var(--muted);
  cursor: pointer;
  transition: background 150ms, color 150ms;
}
.kb-shift-btn:hover { background: var(--bg3); color: var(--text); }
.kb-shift-btn.is-active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
  border-bottom-color: hsl(0 0% 20%);
}
.kb-dl {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 3px solid hsl(0 0% 75%);
  border-radius: 4px;
  padding: 0.375rem 0.875rem;
  font: inherit;
  font-size: var(--text-sm);
  color: var(--text);
  text-decoration: none;
  transition: background 150ms;
  white-space: nowrap;
}
.kb-dl:hover { background: var(--bg3); }
.kb-legend {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: var(--text-xs);
  color: var(--muted);
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.kb-legend-key {
  display: inline-block;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: 2px solid hsl(0 0% 75%);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--text);
}
.kb-legend-hold {
  display: inline-block;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 1px 4px;
  font-size: 0.65rem;
  color: var(--muted);
}
.kb-legend-sep { color: var(--border); }

.kb-board-wrap { overflow-x: auto; padding-bottom: 2rem; }
.kb-board {
  display: flex;
  align-items: flex-end;
  gap: 0;
  width: max-content;
}

/* PCB halves */
.kb-half {
  background: hsl(220 15% 12%);
  border-radius: 14px;
  padding: 12px 16px 28px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
}

/* Component bar at top of each PCB */
.kb-component-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 2px 6px;
  gap: 8px;
}
.kb-chip {
  display: flex;
  align-items: center;
  gap: 5px;
}
.kb-chip-label {
  font-size: 0.6rem;
  color: hsl(200 60% 60%);
  letter-spacing: 0.05em;
  font-weight: 600;
  font-family: ui-monospace, monospace;
}
.kb-port {
  font-size: 0.55rem;
  color: hsl(0 0% 45%);
  border: 1px solid hsl(0 0% 30%);
  border-radius: 3px;
  padding: 1px 4px;
  letter-spacing: 0.04em;
  font-family: ui-monospace, monospace;
}
.kb-port.usb { color: hsl(200 60% 55%); border-color: hsl(200 40% 35%); }
.kb-port.trrs { color: hsl(0 70% 55%); border-color: hsl(0 50% 35%); }

/* TRRS cable in gap */
.kb-cable-gap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 5rem;
  flex-shrink: 0;
  align-self: center;
  margin-bottom: 80px; /* align with middle of key area */
}

.kb-cols {
  display: flex;
  flex-direction: row;
  gap: 4px;
  align-items: flex-start;
}
.kb-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kb-thumb-row {
  display: flex;
  gap: 4px;
  padding-top: 4px;
  overflow: visible;
}

/* Keys — white keycaps */
.kb-key {
  width: 52px;
  height: 52px;
  background: hsl(0 0% 94%);
  border: 1px solid hsl(0 0% 76%);
  border-bottom: 3px solid hsl(0 0% 60%);
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4px;
  box-sizing: border-box;
  transition: background 150ms, border-bottom-width 80ms, transform 80ms;
  cursor: default;
  flex-shrink: 0;
  overflow: hidden;
  color: hsl(0 0% 12%);
}
.kb-key:hover {
  background: hsl(0 0% 86%);
  border-bottom-width: 1px;
  transform: translateY(2px);
}
.kb-key.is-trns { opacity: 0.28; }
.kb-key.is-empty { visibility: hidden; }
.kb-key.has-hold { justify-content: space-between; padding: 6px 4px 5px; }
.kb-key.is-layer-key { cursor: pointer; }
.kb-key.is-layer-key:hover { background: hsl(220 60% 88%); border-color: hsl(220 40% 70%); }
.kb-key.is-shift-key { cursor: pointer; }
.kb-key.is-shift-active {
  background: hsl(45 90% 80%);
  border-color: hsl(45 70% 62%);
  border-bottom-color: hsl(45 70% 46%);
}
.kb-key.is-shift-active .kb-tap { color: hsl(0 0% 10%); }
.kb-key.is-shift-active .kb-hold { color: hsl(0 0% 35%); border-color: hsl(0 0% 55%); }

.kb-tap {
  font-size: var(--text-sm);
  font-weight: 600;
  line-height: 1;
  text-align: center;
  color: hsl(0 0% 12%);
}
.kb-key.is-trns .kb-tap { font-weight: 400; }
.kb-hold {
  font-size: 0.6rem;
  color: hsl(0 0% 42%);
  line-height: 1;
  border: 1px solid hsl(0 0% 72%);
  border-radius: 2px;
  padding: 1px 3px;
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Right half: keys flush right within PCB */
.kb-half.kb-right { align-items: flex-end; }
.kb-half.kb-right .kb-component-bar { width: 100%; }

.kb-thumb-spacer {
  flex-shrink: 0;
  width: 220px;
}
</style>

<script>
const LAYERS = [
  [
    ["RALT_T(KC_Q)","KC_W","KC_E","KC_R","KC_T"],
    ["MEH_T(KC_A)","KC_S","KC_D","KC_F","KC_G"],
    ["LCTL_T(KC_Z)","KC_X","KC_C","KC_V","KC_B"],
    ["LSFT_T(KC_SPACE)","LT1(KC_GRAVE)",-1,-1,-1],
    ["KC_Y","KC_U","KC_I","KC_O","KC_P"],
    ["KC_H","KC_J","KC_K","KC_L","KC_SCOLON"],
    ["KC_N","KC_M","KC_COMMA","KC_DOT","KC_SLASH"],
    ["LT2(KC_BSPACE)","LGUI_T(KC_TAB)",-1,-1,-1]
  ],
  [
    ["KC_1","KC_2","KC_3","KC_4","KC_5"],
    ["KC_GESC","KC_MPRV","KC_MPLY","KC_MNXT","KC_HOME"],
    ["KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS","KC_END"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1],
    ["KC_6","KC_7","KC_8","KC_9","KC_0"],
    ["KC_LEFT","KC_DOWN","KC_UP","KC_RIGHT","KC_QUOTE"],
    ["KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS","KC_ENTER"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1]
  ],
  [
    ["KC_F1","KC_F2","KC_F3","KC_F4","KC_F5"],
    ["KC_TAB","KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS"],
    ["KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS","KC_TRNS"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1],
    ["KC_F6","KC_F7","KC_F8","KC_F9","KC_F10"],
    ["KC_MINUS","KC_EQUAL","KC_LBRACKET","KC_RBRACKET","LSFT(KC_BSLASH)"],
    ["LSFT(KC_MINUS)","LSFT(KC_EQUAL)","KC_TRNS","KC_TRNS","KC_BSLASH"],
    ["KC_TRNS","KC_TRNS",-1,-1,-1]
  ]
];

const KC_MAP = {
  'KC_SPACE': 'Space', 'KC_BSPACE': '⌫', 'KC_ENTER': '↵',
  'KC_TAB': 'Tab', 'KC_ESC': 'Esc', 'KC_GESC': 'Esc/`',
  'KC_GRAVE': '`', 'KC_SCOLON': ';', 'KC_COMMA': ',',
  'KC_DOT': '.', 'KC_SLASH': '/', 'KC_BSLASH': '\\',
  'KC_QUOTE': "'", 'KC_MINUS': '-', 'KC_EQUAL': '=',
  'KC_LBRACKET': '[', 'KC_RBRACKET': ']',
  'KC_LEFT': '←', 'KC_RIGHT': '→', 'KC_UP': '↑', 'KC_DOWN': '↓',
  'KC_HOME': 'Home', 'KC_END': 'End', 'KC_PGUP': 'PgUp', 'KC_PGDN': 'PgDn',
  'KC_MPRV': '⏮', 'KC_MPLY': '⏯', 'KC_MNXT': '⏭',
  'KC_MUTE': '🔇', 'KC_VOLU': '🔊', 'KC_VOLD': '🔉',
  'KC_DEL': 'Del', 'KC_INS': 'Ins', 'KC_CAPS': 'Caps',
  'KC_LSFT': '⇧', 'KC_RSFT': '⇧', 'KC_LCTL': 'Ctrl', 'KC_RCTL': 'Ctrl',
  'KC_LALT': '⌥', 'KC_RALT': 'RAlt', 'KC_LGUI': '⌘', 'KC_RGUI': '⌘',
};
const MOD_LABELS = {
  'LSFT_T': '⇧ shift', 'LCTL_T': 'ctrl', 'RALT_T': 'ralt',
  'MEH_T': 'meh', 'LGUI_T': '⌘ cmd', 'LALT_T': '⌥ opt',
};

const LEFT_STAGGER  = [52, 26, 0, 16, 36];
const RIGHT_STAGGER = [36, 16, 0, 26, 52];
const LEFT_THUMB_TRANSFORMS  = [[10, -19], [20, 0]];   // Space (outer), LT1 (inner)
const RIGHT_THUMB_TRANSFORMS = [[-20, 0], [-10, -19]]; // LT2 (inner), Tab (outer)

const SHIFT_MAP = {
  '1':'!','2':'@','3':'#','4':'$','5':'%',
  '6':'^','7':'&','8':'*','9':'(','0':')',
  ';':':',',':'<','.':'>','/':'?','\\':'|',
  "'":'"','-':'_','=':'+','[':'{',']':'}','`':'~',
};

let shiftActive = false;
let currentLayer = 0;

function parseKey(code) {
  if (code === -1 || code === 'KC_NO') return { tap: '', empty: true };
  if (code === 'KC_TRNS') return { tap: '▽', trns: true };
  const shifted = code.match(/^LSFT\((.+)\)$/);
  if (shifted) { const i = parseKey(shifted[1]); return { tap: '⇧' + i.tap }; }
  const modtap = code.match(/^(LSFT_T|LCTL_T|RALT_T|MEH_T|LGUI_T|LALT_T)\((.+)\)$/);
  if (modtap) { const i = parseKey(modtap[2]); return { tap: i.tap, hold: MOD_LABELS[modtap[1]] || modtap[1], isShift: modtap[1] === 'LSFT_T' }; }
  const lt = code.match(/^LT(\d+)\((.+)\)$/);
  if (lt) { const i = parseKey(lt[2]); return { tap: i.tap, hold: 'layer ' + lt[1], isLayerTap: true, layerNum: parseInt(lt[1], 10) }; }
  if (KC_MAP[code]) return { tap: KC_MAP[code] };
  if (code.startsWith('KC_')) return { tap: code.slice(3) };
  return { tap: code };
}

function applyShift(tap) {
  if (tap.startsWith('⇧')) return tap;
  return SHIFT_MAP[tap] !== undefined ? SHIFT_MAP[tap] : tap;
}

function switchLayer(idx) {
  currentLayer = idx;
  document.querySelectorAll('.kb-tab').forEach(b => {
    const active = parseInt(b.dataset.layer, 10) === idx;
    b.classList.toggle('is-active', active);
    b.setAttribute('aria-selected', String(active));
  });
  renderLayer(idx);
}

function makeKey(code, thumbTransform) {
  const k = parseKey(String(code));
  const el = document.createElement('div');
  el.className = 'kb-key';
  el.title = String(code);

  if (thumbTransform) {
    const [rot, ty] = thumbTransform;
    el.style.transform = `rotate(${rot}deg) translateY(${ty}px)`;
    el.style.transformOrigin = 'center bottom';
    el.style.flexShrink = '0';
  }

  if (k.empty) { el.classList.add('is-empty'); return el; }
  if (k.trns)  { el.classList.add('is-trns'); }
  if (k.hold)  { el.classList.add('has-hold'); }

  if (k.isShift) {
    el.classList.add('is-shift-key');
    if (shiftActive) el.classList.add('is-shift-active');
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => {
      shiftActive = !shiftActive;
      const btn = document.getElementById('kb-shift-btn');
      btn.classList.toggle('is-active', shiftActive);
      btn.setAttribute('aria-pressed', String(shiftActive));
      renderLayer(currentLayer);
    });
  }

  if (k.isLayerTap) {
    el.classList.add('is-layer-key');
    el.addEventListener('click', () => switchLayer(k.layerNum));
  }

  const tap = document.createElement('span');
  tap.className = 'kb-tap';
  tap.textContent = (shiftActive && !k.trns && !k.isShift) ? applyShift(k.tap) : k.tap;
  el.appendChild(tap);

  if (k.hold) {
    const hold = document.createElement('span');
    hold.className = 'kb-hold';
    hold.textContent = k.hold;
    el.appendChild(hold);
  }

  return el;
}

function makeHalf(rows, stagger) {
  const cols = document.createElement('div');
  cols.className = 'kb-cols';
  for (let c = 0; c < 5; c++) {
    const col = document.createElement('div');
    col.className = 'kb-col';
    col.style.paddingTop = stagger[c] + 'px';
    for (let r = 0; r < 3; r++) col.appendChild(makeKey(rows[r][c]));
    cols.appendChild(col);
  }
  return cols;
}

// RP2040 chip SVG
function makeChipSvg() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', '34'); svg.setAttribute('height', '22');
  svg.setAttribute('viewBox', '0 0 34 22');

  const body = document.createElementNS(ns, 'rect');
  body.setAttribute('x', '5'); body.setAttribute('y', '1');
  body.setAttribute('width', '24'); body.setAttribute('height', '20');
  body.setAttribute('rx', '2'); body.setAttribute('fill', '#1a1f3a');
  body.setAttribute('stroke', '#2a3060'); body.setAttribute('stroke-width', '1');
  svg.appendChild(body);

  // dot marker top-left
  const dot = document.createElementNS(ns, 'circle');
  dot.setAttribute('cx', '8'); dot.setAttribute('cy', '4');
  dot.setAttribute('r', '1.2'); dot.setAttribute('fill', '#3a4080');
  svg.appendChild(dot);

  // pins — left and right sides, 4 each
  [[0, 4], [0, 8], [0, 13], [0, 17]].forEach(([x, y]) => {
    const pin = document.createElementNS(ns, 'rect');
    pin.setAttribute('x', x); pin.setAttribute('y', y);
    pin.setAttribute('width', '5'); pin.setAttribute('height', '2');
    pin.setAttribute('fill', '#7a8090'); pin.setAttribute('rx', '0.5');
    svg.appendChild(pin);
  });
  [[29, 4], [29, 8], [29, 13], [29, 17]].forEach(([x, y]) => {
    const pin = document.createElementNS(ns, 'rect');
    pin.setAttribute('x', x); pin.setAttribute('y', y);
    pin.setAttribute('width', '5'); pin.setAttribute('height', '2');
    pin.setAttribute('fill', '#7a8090'); pin.setAttribute('rx', '0.5');
    svg.appendChild(pin);
  });

  return svg;
}

// TRRS cable SVG in gap — red coiled cable with plug ends
function makeCableSvg() {
  const ns = 'http://www.w3.org/2000/svg';
  const W = 80, H = 56;
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', String(W)); svg.setAttribute('height', String(H));
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.style.cssText = 'display:block;overflow:visible';

  // Cable path — drooping arc in red
  const cable = document.createElementNS(ns, 'path');
  cable.setAttribute('d', `M 10,14 C 10,38 70,38 70,14`);
  cable.setAttribute('stroke', '#cc2020');
  cable.setAttribute('stroke-width', '5');
  cable.setAttribute('fill', 'none');
  cable.setAttribute('stroke-linecap', 'round');
  svg.appendChild(cable);

  // Cable highlight
  const highlight = document.createElementNS(ns, 'path');
  highlight.setAttribute('d', `M 10,14 C 10,38 70,38 70,14`);
  highlight.setAttribute('stroke', '#ff4040');
  highlight.setAttribute('stroke-width', '2');
  highlight.setAttribute('fill', 'none');
  highlight.setAttribute('stroke-linecap', 'round');
  highlight.setAttribute('opacity', '0.4');
  svg.appendChild(highlight);

  // TRRS plugs (left and right)
  [[0, 8], [62, 8]].forEach(([x, y]) => {
    // Barrel
    const barrel = document.createElementNS(ns, 'rect');
    barrel.setAttribute('x', x); barrel.setAttribute('y', y);
    barrel.setAttribute('width', '18'); barrel.setAttribute('height', '12');
    barrel.setAttribute('rx', '3'); barrel.setAttribute('fill', '#555');
    svg.appendChild(barrel);

    // TRRS rings (3 gold bands)
    [3, 7, 11].forEach(rx => {
      const ring = document.createElementNS(ns, 'rect');
      ring.setAttribute('x', x + rx); ring.setAttribute('y', y + 1);
      ring.setAttribute('width', '2'); ring.setAttribute('height', '10');
      ring.setAttribute('fill', '#c8a000'); ring.setAttribute('rx', '0.5');
      svg.appendChild(ring);
    });

    // Tip
    const tip = document.createElementNS(ns, 'rect');
    tip.setAttribute('x', x === 0 ? x - 3 : x + 18);
    tip.setAttribute('y', y + 3);
    tip.setAttribute('width', '3'); tip.setAttribute('height', '6');
    tip.setAttribute('rx', '1.5'); tip.setAttribute('fill', '#888');
    svg.appendChild(tip);
  });

  // Label
  const label = document.createElementNS(ns, 'text');
  label.setAttribute('x', '40'); label.setAttribute('y', '52');
  label.setAttribute('text-anchor', 'middle');
  label.setAttribute('font-size', '8');
  label.setAttribute('fill', 'hsl(0 0% 40%)');
  label.setAttribute('font-family', 'ui-monospace, monospace');
  label.textContent = 'TRRS';
  svg.appendChild(label);

  return svg;
}

function makeComponentBar(isLeft) {
  const bar = document.createElement('div');
  bar.className = 'kb-component-bar';

  // Left side: RP2040 chip
  const chip = document.createElement('div');
  chip.className = 'kb-chip';
  chip.appendChild(makeChipSvg());
  const label = document.createElement('span');
  label.className = 'kb-chip-label';
  label.textContent = 'RP2040';
  chip.appendChild(label);
  bar.appendChild(chip);

  // Right side: port indicators
  const ports = document.createElement('div');
  ports.style.cssText = 'display:flex;gap:4px;align-items:center';

  if (isLeft) {
    const usb = document.createElement('span');
    usb.className = 'kb-port usb';
    usb.textContent = 'USB-C';
    ports.appendChild(usb);
  }

  const trrs = document.createElement('span');
  trrs.className = 'kb-port trrs';
  trrs.textContent = 'TRRS';
  ports.appendChild(trrs);

  bar.appendChild(ports);
  return bar;
}

function renderLayer(idx) {
  currentLayer = idx;
  const data = LAYERS[idx];
  const board = document.getElementById('kb-board');
  board.innerHTML = '';

  // Left half
  const left = document.createElement('div');
  left.className = 'kb-half kb-left';
  left.appendChild(makeComponentBar(true));
  left.appendChild(makeHalf([data[0], data[1], data[2]], LEFT_STAGGER));
  const leftThumb = document.createElement('div');
  leftThumb.className = 'kb-thumb-row';
  const lSpacer = document.createElement('div');
  lSpacer.className = 'kb-thumb-spacer';
  leftThumb.appendChild(lSpacer);
  leftThumb.appendChild(makeKey(data[3][0], LEFT_THUMB_TRANSFORMS[0]));
  leftThumb.appendChild(makeKey(data[3][1], LEFT_THUMB_TRANSFORMS[1]));
  left.appendChild(leftThumb);
  board.appendChild(left);

  // Cable gap
  const gap = document.createElement('div');
  gap.className = 'kb-cable-gap';
  gap.appendChild(makeCableSvg());
  board.appendChild(gap);

  // Right half
  const right = document.createElement('div');
  right.className = 'kb-half kb-right';
  right.appendChild(makeComponentBar(false));
  right.appendChild(makeHalf([data[4], data[5], data[6]], RIGHT_STAGGER));
  const rightThumb = document.createElement('div');
  rightThumb.className = 'kb-thumb-row';
  rightThumb.appendChild(makeKey(data[7][0], RIGHT_THUMB_TRANSFORMS[0]));
  rightThumb.appendChild(makeKey(data[7][1], RIGHT_THUMB_TRANSFORMS[1]));
  const rSpacer = document.createElement('div');
  rSpacer.className = 'kb-thumb-spacer';
  rightThumb.appendChild(rSpacer);
  right.appendChild(rightThumb);
  board.appendChild(right);
}

document.querySelectorAll('.kb-tab').forEach(btn => {
  btn.addEventListener('click', () => switchLayer(parseInt(btn.dataset.layer, 10)));
});

document.getElementById('kb-shift-btn').addEventListener('click', () => {
  shiftActive = !shiftActive;
  const btn = document.getElementById('kb-shift-btn');
  btn.classList.toggle('is-active', shiftActive);
  btn.setAttribute('aria-pressed', String(shiftActive));
  renderLayer(currentLayer);
});

renderLayer(0);
</script>
