{{- partial "header.html" . -}}

<style>
  .photos-intro {
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-6);
  }

  .photos-intro a {
    color: var(--color-accent);
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-3);
    margin-bottom: var(--space-7);
  }

  @media (max-width: 600px) {
    .photo-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .photo-card {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: var(--border-radius);
    background: var(--color-bg-secondary);
    border: 1px solid var(--color-border-light);
  }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .photo-card:hover img {
    transform: scale(1.05);
  }

  .photo-card a {
    display: block;
    width: 100%;
    height: 100%;
  }

  .photo-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: var(--space-3);
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .photo-card:hover .photo-overlay {
    opacity: 1;
  }

  .photo-caption {
    font-size: var(--text-xs);
    color: #fff;
    line-height: 1.3;
  }

  .photo-location {
    font-size: var(--text-xs);
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  .photos-loading {
    text-align: center;
    padding: var(--space-7) 0;
    color: var(--color-text-muted);
  }

  .photos-error {
    text-align: center;
    padding: var(--space-7) 0;
    color: var(--color-text-muted);
  }
</style>

<div class="main">
  <h1>Photos</h1>
  <p class="photos-intro">
    Street and coastal photography from Portsmouth and Hampshire.
    See more at <a href="https://charityshot.co.uk/feed" target="_blank" rel="noopener noreferrer">charityshot.co.uk</a>.
  </p>

  <div id="photos-container">
    <p class="photos-loading">Loading photos...</p>
  </div>
</div>

<script>
(function() {
  var container = document.getElementById('photos-container');
  var feedUrl = 'https://charityshot.co.uk/feed/rss.xml';

  fetch(feedUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('Feed fetch failed');
      return r.text();
    })
    .then(function(xml) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(xml, 'text/xml');
      var items = doc.querySelectorAll('item');

      if (!items.length) {
        container.innerHTML = '<p class="photos-error">No photos found.</p>';
        return;
      }

      var html = '<div class="photo-grid">';

      items.forEach(function(item) {
        var title = item.querySelector('title') ? item.querySelector('title').textContent : '';
        var link = item.querySelector('link') ? item.querySelector('link').textContent : '#';
        var enclosure = item.querySelector('enclosure');
        var imageUrl = enclosure ? enclosure.getAttribute('url') : '';

        // Try to extract location from description
        var desc = item.querySelector('description') ? item.querySelector('description').textContent : '';
        var locationMatch = desc.match(/Location:\s*([^|]+)/);
        var location = locationMatch ? locationMatch[1].trim() : '';

        if (imageUrl) {
          html += '<div class="photo-card">';
          html += '<a href="' + link + '" target="_blank" rel="noopener noreferrer">';
          html += '<img src="' + imageUrl + '" alt="' + title.replace(/"/g, '&quot;') + '" loading="lazy">';
          html += '</a>';
          html += '<div class="photo-overlay">';
          if (title) html += '<div class="photo-caption">' + title + '</div>';
          if (location) html += '<div class="photo-location">' + location + '</div>';
          html += '</div>';
          html += '</div>';
        }
      });

      html += '</div>';
      container.innerHTML = html;
    })
    .catch(function() {
      container.innerHTML = '<p class="photos-error">Could not load photos. Visit <a href="https://charityshot.co.uk/feed">charityshot.co.uk</a> instead.</p>';
    });
})();
</script>
