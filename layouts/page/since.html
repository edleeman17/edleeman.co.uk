{{ define "main" }}
<div class="since-page">
  <h1 class="since-title">{{ .Title }}</h1>
  {{ with .Description }}<p class="since-desc">{{ . }}</p>{{ end }}

  <div class="milestones">

    <div class="milestone">
      <div class="milestone-header">
        <span class="milestone-label">no vaping</span>
        <span class="milestone-count" id="v-count"></span>
      </div>
      <div class="grid-scroll" id="v-scroll">
        <div class="day-grid" id="v-grid"></div>
      </div>
      <div class="milestone-meta">since 15 May 2026, 1:00 pm</div>
    </div>

    <div class="milestone">
      <div class="milestone-header">
        <span class="milestone-label">photography</span>
        <span class="milestone-count" id="p-count"></span>
      </div>
      <div class="grid-scroll" id="p-scroll">
        <div class="day-grid" id="p-grid"></div>
      </div>
      <div class="milestone-meta">since 27 Feb 2025, 10:06 am</div>
    </div>

  </div>
</div>

<style>
.since-page {
  max-width: 900px;
  margin: 0 auto;
  padding: var(--spacing-lg, 3em) var(--spacing-md, 1.5em);
}
.since-title {
  font-size: var(--text-2xl, 1.5rem);
  font-weight: 700;
  margin: 0 0 var(--spacing-sm, 0.75em);
}
.since-desc {
  color: var(--muted, #6b6b6b);
  font-size: var(--text-sm, 0.875rem);
  margin: 0 0 var(--spacing-lg, 3em);
}
.milestones {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-lg, 3em);
}
.milestone {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm, 0.75em);
}
.milestone-header {
  display: flex;
  align-items: baseline;
  gap: 1em;
}
.milestone-label {
  font-size: var(--text-sm, 0.875rem);
  font-weight: 600;
  color: var(--text, #141414);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.milestone-count {
  font-size: var(--text-xs, 0.75rem);
  color: var(--muted, #6b6b6b);
}
.grid-scroll {
  overflow-x: auto;
  padding-bottom: 4px;
}
.day-grid {
  display: grid;
  grid-template-rows: repeat(7, 11px);
  grid-auto-flow: column;
  grid-auto-columns: 11px;
  gap: 2px;
  width: max-content;
}
.day-cell {
  width: 11px;
  height: 11px;
  border-radius: 2px;
  background: var(--bg3, #ededed);
  position: relative;
}
.day-cell.filled {
  background: var(--text, #141414);
}
.day-cell.today {
  background: var(--muted, #6b6b6b);
}
.day-cell.lapsed {
  background: #c2410c;
  cursor: help;
}
.day-cell.empty {
  background: transparent;
}
.day-cell.has-photo {
  text-decoration: none;
  display: block;
}
.day-cell.has-photo::after {
  content: '';
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.milestone-meta {
  font-size: var(--text-xs, 0.75rem);
  color: var(--muted, #6b6b6b);
}
</style>

<script>
(function() {
  var DAY = 86400000;

  function toDateKey(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function buildGrid(gridId, scrollId, countId, sinceISO, photoMap, lapseSet) {
    var since = new Date(sinceISO);
    var now = new Date();
    var daysSince = Math.floor((now - since) / DAY);

    document.getElementById(countId).textContent = daysSince + ' day' + (daysSince === 1 ? '' : 's');

    var startDay = new Date(since);
    var dow = startDay.getDay();
    var offsetToMon = (dow === 0) ? -6 : 1 - dow;
    startDay.setDate(startDay.getDate() + offsetToMon);
    startDay.setHours(0, 0, 0, 0);

    var endDay = new Date(now);
    var endDow = endDay.getDay();
    var offsetToSun = (endDow === 0) ? 0 : 7 - endDow;
    endDay.setDate(endDay.getDate() + offsetToSun);
    endDay.setHours(0, 0, 0, 0);

    var totalDays = Math.round((endDay - startDay) / DAY) + 1;
    var minDays = 8 * 7;
    if (totalDays < minDays) {
      endDay = new Date(startDay.getTime() + (minDays - 1) * DAY);
      totalDays = minDays;
    }

    var grid = document.getElementById(gridId);
    var todayMidnight = new Date(now);
    todayMidnight.setHours(0, 0, 0, 0);
    var sinceMidnight = new Date(since);
    sinceMidnight.setHours(0, 0, 0, 0);

    for (var i = 0; i < totalDays; i++) {
      var d = new Date(startDay.getTime() + i * DAY);
      var key = toDateKey(d);
      var photoSlug = photoMap ? photoMap[key] : null;

      var cell;
      if (photoSlug) {
        cell = document.createElement('a');
        cell.href = 'https://charityshot.co.uk/feed/' + photoSlug;
        cell.target = '_blank';
        cell.rel = 'noopener noreferrer';
        cell.title = key;
      } else {
        cell = document.createElement('div');
      }

      cell.className = 'day-cell';

      if (d < sinceMidnight) {
        cell.classList.add('empty');
      } else if (d.getTime() === todayMidnight.getTime() || d.getTime() === sinceMidnight.getTime()) {
        cell.classList.add('today');
      } else if (d <= todayMidnight) {
        cell.classList.add('filled');
      }

      if (lapseSet && lapseSet[key]) {
        cell.classList.remove('today', 'filled');
        cell.classList.add('lapsed');
        cell.title = 'slip';
      }

      if (photoSlug) {
        cell.classList.add('has-photo');
      }

      grid.appendChild(cell);
    }

    var scroller = document.getElementById(scrollId);
    scroller.scrollLeft = scroller.scrollWidth;
  }

  buildGrid('v-grid', 'v-scroll', 'v-count', '2026-05-15T12:00:00Z', null, { '2026-06-03': true });

  fetch('https://charityshot.co.uk/api/photos.json')
    .then(function(r) { return r.json(); })
    .then(function(photos) {
      var map = {};
      photos.forEach(function(photo) {
        if (!photo.date) return;
        var key = toDateKey(new Date(photo.date));
        map[key] = photo.slug;
      });
      buildGrid('p-grid', 'p-scroll', 'p-count', '2025-02-27T10:06:00Z', map);
    })
    .catch(function() {
      buildGrid('p-grid', 'p-scroll', 'p-count', '2025-02-27T10:06:00Z', null);
    });
})();
</script>

{{ partial "back-nav.html" . }}
{{ end }}
