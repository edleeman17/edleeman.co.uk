name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["Syndicate to Mastodon", "Syndicate to Bluesky", "Syndicate to Threads"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.154.5'
          extended: true

      - name: Build Hugo site
        run: hugo

      - name: Build Pagefind search index
        run: npx --yes pagefind --site public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ping WebSub hub
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST https://pubsubhubbub.appspot.com/ \
            --data-urlencode "hub.mode=publish" \
            --data-urlencode "hub.url=https://edleeman.co.uk/index.xml"
