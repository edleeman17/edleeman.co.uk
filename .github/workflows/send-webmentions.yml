name: Send Webmentions

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      url:
        description: 'Feed URL to scan'
        required: false
        default: 'https://edleeman.co.uk/index.xml'
      limit:
        description: 'Max entries to process'
        required: false
        default: '10'

jobs:
  check:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_commit.author.name != 'github-actions[bot]')
    outputs:
      has_content: ${{ steps.diff.outputs.has_content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - id: diff
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- content/posts/ content/notes/ content/links/ content/reading/)
          echo "has_content=$([ -n "$FILES" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  send-webmentions:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.has_content == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Wait for CDN propagation
        if: github.event_name != 'workflow_dispatch'
        run: sleep 30
      - name: Send webmentions
        env:
          URL: ${{ github.event.inputs.url || 'https://edleeman.co.uk/index.xml' }}
          LIMIT: ${{ github.event.inputs.limit || '10' }}
        run: |
          echo "Checking feed: ${URL} (limit=${LIMIT})"
          RESPONSE=$(curl -s -X POST \
            "https://webmention.app/check?token=${{ secrets.WEBMENTION_APP_TOKEN }}&url=${URL}&limit=${LIMIT}")
          echo "Response: ${RESPONSE}"
          if echo "${RESPONSE}" | grep -q '"error":true'; then
            echo "::warning::webmention.app returned an error: ${RESPONSE}"
          fi
