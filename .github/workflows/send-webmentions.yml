name: Send Webmentions

on:
  push:
    branches: [master]
    paths:
      - 'content/posts/**'
      - 'content/notes/**'
  workflow_dispatch:

jobs:
  send-webmentions:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy
        if: ${{ github.event_name == 'push' }}
        run: sleep 120
      - name: Send webmentions
        run: |
          curl -s -X POST \
            "https://webmention.app/check?token=${{ secrets.WEBMENTION_APP_TOKEN }}&url=https://edleeman.co.uk/index.xml"
