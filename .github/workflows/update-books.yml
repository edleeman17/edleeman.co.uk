name: Update Goodreads Books

# Disabled — edleeman.co.uk/data/books.json is now the source of truth.
# Books are pushed FROM here TO Goodreads/Fable via scripts/book-sync/.
# on:
#   schedule:
#     - cron: '0 7 * * 0'
#   workflow_dispatch:

on: workflow_dispatch  # manual-only, kept as a fallback

jobs:
  update-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Goodreads shelves
        env:
          GOODREADS_USER_ID: "116999306"
        run: python .github/scripts/fetch_books.py

      - name: Commit updated book data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/books.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update Goodreads book list"
          git push
