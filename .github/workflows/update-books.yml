name: Update Goodreads Books

on:
  schedule:
    - cron: '0 7 * * 0'  # Every Sunday at 07:00 UTC
  workflow_dispatch:      # Allow manual runs from the Actions tab

jobs:
  update-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Goodreads shelves
        env:
          GOODREADS_USER_ID: "116999306"
        run: python .github/scripts/fetch_books.py

      - name: Commit updated book data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/books.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update Goodreads book list"
          git push
