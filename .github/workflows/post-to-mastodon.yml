name: Syndicate to Mastodon

on:
  push:
    branches: [master]
    paths:
      - 'content/posts/**'
      - 'content/notes/**'
      - 'content/links/**'
      - 'content/reading/**'
  workflow_dispatch:
    inputs:
      date:
        description: 'Backfill link files with this date prefix (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  syndicate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find new content and syndicate
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DATE="${{ github.event.inputs.date }}"
            if [ -z "$DATE" ]; then
              DATE=$(date -u +%Y-%m-%d)
            fi
            echo "Backfill mode: content/links/${DATE}-*.md"
            FILES=$(ls content/links/${DATE}-*.md 2>/dev/null || true)
            READING_FILES=""
          else
            FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/posts/' 'content/notes/' 'content/links/')
            # For reading files use AM (Added or Modified) so shelf changes also trigger POSSE
            READING_FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'content/reading/')
          fi

          ALL_FILES="$FILES $READING_FILES"
          if [ -z "$(echo $ALL_FILES | tr -d ' ')" ]; then
            echo "No matching files found"
            exit 0
          fi

          CHANGED=false

          for FILE in $ALL_FILES; do
            [ -f "$FILE" ] || continue

            # Skip if syndication URLs already present
            if grep -q '^syndication:' "$FILE"; then
              echo "Skipping $FILE - already syndicated"
              continue
            fi

            # Extract title from frontmatter
            TITLE=$(sed -n 's/^title: *"\(.*\)"/\1/p' "$FILE" | head -1)

            # Build URL from file path
            SLUG=$(echo "$FILE" | sed 's|^content/||;s|\.md$|/|')
            URL="https://edleeman.co.uk/${SLUG}"

            # Format by content type
            if [[ "$FILE" == content/reading/* ]]; then
              # Only POSSE finished reads
              SHELF=$(sed -n 's/^shelf: *"\(.*\)"/\1/p' "$FILE" | head -1)
              if [ "$SHELF" != "read" ]; then
                echo "Skipping $FILE - shelf is '$SHELF', not 'read'"
                continue
              fi

              AUTHOR=$(sed -n 's/^author: *"\(.*\)"/\1/p' "$FILE" | head -1)
              RATING=$(sed -n 's/^rating: *\([0-9]*\)/\1/p' "$FILE" | head -1)
              REVIEW=$(sed -n 's/^review: *"\(.*\)"/\1/p' "$FILE" | head -1)

              # Build star string
              STARS=""
              if [ -n "$RATING" ] && [ "$RATING" -gt 0 ]; then
                for i in $(seq 1 "$RATING"); do STARS="${STARS}★"; done
                for i in $(seq "$RATING" 4); do STARS="${STARS}☆"; done
              fi

              STATUS="📚 \"${TITLE}\" by ${AUTHOR}"
              if [ -n "$STARS" ]; then
                STATUS="${STATUS} — ${STARS}"
              fi
              if [ -n "$REVIEW" ]; then
                STATUS="${STATUS}\n\n${REVIEW}"
              fi
              STATUS="${STATUS}\n\n${URL}"

            elif [[ "$FILE" == content/links/* ]]; then
              EXTERNAL_LINK=$(sed -n 's/^link: *"\(.*\)"/\1/p' "$FILE" | head -1)
              DESCRIPTION=$(sed -n 's/^description: *"\(.*\)"/\1/p' "$FILE" | head -1)
              CLEAN_TITLE="${TITLE#→ }"
              STATUS="🔖 ${CLEAN_TITLE}"
              if [ -n "$DESCRIPTION" ]; then
                STATUS="${STATUS}\n\n${DESCRIPTION}"
              fi
              STATUS="${STATUS}\n\n${EXTERNAL_LINK}\n\nvia ${URL}"
            else
              STATUS="${TITLE}\n${URL}"
            fi

            echo "Posting to Mastodon: $STATUS"

            MASTODON_RESPONSE=$(curl -s -X POST \
              "https://fosstodon.org/api/v1/statuses" \
              -H "Authorization: Bearer ${MASTODON_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"status\": \"${STATUS}\", \"visibility\": \"public\"}")

            MASTODON_URL=$(echo "$MASTODON_RESPONSE" | jq -r '.url // empty')

            if [ -n "$MASTODON_URL" ]; then
              echo "Mastodon URL: $MASTODON_URL"

              # Insert syndication into frontmatter before closing ---
              awk -v url="$MASTODON_URL" '
                BEGIN { count=0 }
                /^---$/ {
                  count++
                  if (count == 2) {
                    print "syndication:"
                    print "  - \"" url "\""
                  }
                }
                { print }
              ' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"

              CHANGED=true
            else
              echo "Warning: Mastodon post failed or returned no URL"
              echo "$MASTODON_RESPONSE"
            fi
          done

          # Commit syndication URLs back
          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/
            git commit -m "Add syndication URLs from Mastodon"
            git push
          fi
