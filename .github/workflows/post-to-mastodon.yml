name: Post to Mastodon

on:
  push:
    branches: [master]
    paths:
      - 'content/posts/**'
      - 'content/notes/**'

jobs:
  post-to-mastodon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new content and post to Mastodon
        run: |
          # Find added markdown files in this push
          FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/posts/' 'content/notes/')

          if [ -z "$FILES" ]; then
            echo "No new posts or notes found"
            exit 0
          fi

          for FILE in $FILES; do
            # Build URL from file path: content/posts/my-post.md -> posts/my-post/
            SLUG=$(echo "$FILE" | sed 's|^content/||;s|\.md$|/|')
            URL="https://edleeman.co.uk/${SLUG}"

            STATUS="New Post:\n${URL}"

            echo "Posting: $STATUS"

            curl -s -X POST \
              "https://fosstodon.org/api/v1/statuses" \
              -H "Authorization: Bearer ${{ secrets.MASTODON_ACCESS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"status\": \"${STATUS}\", \"visibility\": \"public\"}"
          done
