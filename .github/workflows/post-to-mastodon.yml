name: Syndicate to Mastodon

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      date:
        description: 'Backfill link files with this date prefix (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      file:
        description: 'Specific file to syndicate (e.g. content/notes/2026-04-23-195800.md)'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_commit.author.name != 'github-actions[bot]')
    outputs:
      has_content: ${{ steps.diff.outputs.has_content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - id: diff
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- content/posts/ content/notes/ content/reading/)
          echo "has_content=$([ -n "$FILES" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  syndicate:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.has_content == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find new content and syndicate
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SPECIFIC_FILE="${{ github.event.inputs.file }}"
            if [ -n "$SPECIFIC_FILE" ]; then
              echo "Single file mode: $SPECIFIC_FILE"
              FILES="$SPECIFIC_FILE"
            else
              DATE="${{ github.event.inputs.date }}"
              if [ -z "$DATE" ]; then
                DATE=$(date -u +%Y-%m-%d)
              fi
              echo "Backfill mode: content/links/${DATE}-*.md"
              FILES=$(ls content/links/${DATE}-*.md 2>/dev/null || true)
            fi
            READING_FILES=""
          else
            FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'content/posts/' 'content/notes/' 'content/links/')
            # For reading files use AM (Added or Modified) so shelf changes also trigger POSSE
            READING_FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'content/reading/')
          fi

          ALL_FILES="$FILES $READING_FILES"
          if [ -z "$(echo $ALL_FILES | tr -d ' ')" ]; then
            echo "No matching files found"
            exit 0
          fi

          CHANGED=false

          for FILE in $ALL_FILES; do
            [ -f "$FILE" ] || continue

            # Skip if syndication URLs already present (ignore empty array)
            if grep -A1 '^syndication:' "$FILE" | grep -q '^\s*-\s*"http'; then
              echo "Skipping $FILE - already syndicated"
              continue
            fi

            # Extract title from frontmatter
            TITLE=$(sed -n 's/^title: *"\(.*\)"/\1/p' "$FILE" | head -1)

            # Build URL â€” posts use :title permalink (Hugo slugifies title), others use slug frontmatter or path
            SECTION=$(echo "$FILE" | sed 's|^content/\([^/]*\)/.*|\1|')
            SLUG_FM=$(sed -n 's/^slug: *"\(.*\)"/\1/p' "$FILE" | head -1)
            if [[ "$FILE" == content/posts/* ]] && [ -n "$TITLE" ]; then
              # Match Hugo's :title permalink â€” lowercase, non-alphanumeric to hyphens, collapse/trim hyphens
              TITLE_SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
              URL="https://edleeman.co.uk/posts/${TITLE_SLUG}/"
            elif [ -n "$SLUG_FM" ]; then
              URL="https://edleeman.co.uk/${SECTION}/${SLUG_FM}/"
            else
              SLUG=$(echo "$FILE" | sed 's|^content/||;s|\.md$|/|')
              URL="https://edleeman.co.uk/${SLUG}"
            fi

            # Format by content type
            if [[ "$FILE" == content/reading/* ]]; then
              # Only POSSE finished reads
              SHELF=$(sed -n 's/^shelf: *"\(.*\)"/\1/p' "$FILE" | head -1)
              if [ "$SHELF" != "read" ]; then
                echo "Skipping $FILE - shelf is '$SHELF', not 'read'"
                continue
              fi

              AUTHOR=$(sed -n 's/^author: *"\(.*\)"/\1/p' "$FILE" | head -1)
              RATING=$(sed -n 's/^rating: *\([0-9]*\)/\1/p' "$FILE" | head -1)
              REVIEW=$(sed -n 's/^review: *"\(.*\)"/\1/p' "$FILE" | head -1)

              # Build star string
              STARS=""
              if [ -n "$RATING" ] && [ "$RATING" -gt 0 ]; then
                for i in $(seq 1 "$RATING"); do STARS="${STARS}â˜…"; done
                for i in $(seq "$RATING" 4); do STARS="${STARS}â˜†"; done
              fi

              HEADER="ðŸ“š \"${TITLE}\" by ${AUTHOR}"
              if [ -n "$STARS" ]; then
                HEADER="${HEADER} â€” ${STARS}"
              fi
              if [ -n "$REVIEW" ]; then
                STATUS=$(printf "%s\n\n%s\n\n%s" "$HEADER" "$REVIEW" "$URL")
              else
                STATUS=$(printf "%s\n\n%s" "$HEADER" "$URL")
              fi

            elif [[ "$FILE" == content/links/* ]]; then
              SYNDICATE=$(sed -n 's/^syndicate: *\(true\|false\)/\1/p' "$FILE" | head -1)
              if [ "$SYNDICATE" != "true" ]; then
                echo "Skipping $FILE - syndicate not set to true"
                continue
              fi
              EXTERNAL_LINK=$(sed -n 's/^link: *"\(.*\)"/\1/p' "$FILE" | head -1)
              DESCRIPTION=$(sed -n 's/^description: *"\(.*\)"/\1/p' "$FILE" | head -1)
              CLEAN_TITLE="${TITLE#â†’ }"
              if [ -n "$DESCRIPTION" ]; then
                STATUS=$(printf "ðŸ”– %s\n\n%s\n\n%s\n\nvia %s" "$CLEAN_TITLE" "$DESCRIPTION" "$EXTERNAL_LINK" "$URL")
              else
                STATUS=$(printf "ðŸ”– %s\n\n%s\n\nvia %s" "$CLEAN_TITLE" "$EXTERNAL_LINK" "$URL")
              fi
            elif [[ "$FILE" == content/posts/* ]]; then
              # Posts: "New Post:" + title + excerpt + URL
              MEDIA_IDS="[]"
              FULL_BODY=$(awk '/^---$/{c++;next} c>=2{print}' "$FILE")
              # Join all paragraphs, strip headings and images, keep *emphasis*
              EXCERPT=$(echo "$FULL_BODY" | sed 's/^#\+\s*//' | sed 's/!\[[^]]*\]([^)]*)//g' | sed '/^[[:space:]]*$/d' | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
              # Mastodon: 500 limit, URLs count as 23. "New Post: "(10) + title + 2x"\n\n"(4) + url(23) = overhead
              EXCERPT_MAX=$((500 - 10 - ${#TITLE} - 4 - 23))
              EXCERPT=$(echo "$EXCERPT" | awk -v max="$EXCERPT_MAX" '{if(length($0)>max){match($0,"^.{1,"max"} ");print substr($0,1,RLENGTH-1)"..."}else{print}}')
              if [ -n "$TITLE" ] && [ -n "$EXCERPT" ]; then
                STATUS=$(printf "New Post: %s\n\n%s\n\n%s" "$TITLE" "$EXCERPT" "$URL")
              elif [ -n "$TITLE" ]; then
                STATUS=$(printf "New Post: %s\n\n%s" "$TITLE" "$URL")
              else
                STATUS=$(printf "%s" "$URL")
              fi
            else
              # Notes: use body content (after second ---)
              FULL_BODY=$(awk '/^---$/{c++;next} c>=2{print}' "$FILE")

              # Extract image URLs from markdown ![...](url) and upload to Mastodon
              MEDIA_IDS="[]"
              while IFS= read -r IMG_URL; do
                [ -z "$IMG_URL" ] && continue
                MEDIA_RESPONSE=$(curl -s -X POST \
                  "https://fosstodon.org/api/v1/media" \
                  -H "Authorization: Bearer ${MASTODON_ACCESS_TOKEN}" \
                  -F "url=${IMG_URL}")
                MEDIA_ID=$(echo "$MEDIA_RESPONSE" | jq -r '.id // empty')
                if [ -n "$MEDIA_ID" ]; then
                  MEDIA_IDS=$(echo "$MEDIA_IDS" | jq --arg id "$MEDIA_ID" '. + [$id]')
                fi
              done < <(echo "$FULL_BODY" | grep -oP '!\[.*?\]\(\K[^)]+')

              # Strip image markdown and headings from status text
              BODY=$(echo "$FULL_BODY" | sed 's/^#\+\s*//' | sed 's/!\[[^]]*\]([^)]*)//g' | sed '/^$/d' | head -5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')

              if [ -n "$BODY" ]; then
                STATUS=$(printf "%s\n\n%s" "$BODY" "$URL")
              else
                STATUS=$(printf "%s" "$URL")
              fi
            fi

            echo "Posting to Mastodon: $STATUS"

            MASTODON_RESPONSE=$(curl -s -X POST \
              "https://fosstodon.org/api/v1/statuses" \
              -H "Authorization: Bearer ${MASTODON_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg status "$STATUS" --argjson media_ids "$MEDIA_IDS" \
                '{"status": $status, "visibility": "public"} + (if ($media_ids | length) > 0 then {"media_ids": $media_ids} else {} end)')")

            MASTODON_URL=$(echo "$MASTODON_RESPONSE" | jq -r '.url // empty')

            if [ -n "$MASTODON_URL" ]; then
              echo "Mastodon URL: $MASTODON_URL"

              # Insert syndication into frontmatter before closing ---
              # Skip any bare `syndication: []` line to avoid duplicate keys
              awk -v url="$MASTODON_URL" '
                BEGIN { count=0 }
                /^syndication: \[\]$/ { next }
                /^---$/ {
                  count++
                  if (count == 2) {
                    print "syndication:"
                    print "  - \"" url "\""
                  }
                }
                { print }
              ' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"

              CHANGED=true
            else
              echo "Warning: Mastodon post failed or returned no URL"
              echo "$MASTODON_RESPONSE"
            fi
          done

          # Commit syndication URLs back
          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/
            git commit -m "Add syndication URLs from Mastodon"
            git push
          fi
