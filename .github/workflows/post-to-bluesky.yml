name: Syndicate to Bluesky

on:
  workflow_run:
    workflows: ["Syndicate to Mastodon"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      file:
        description: 'Specific file to syndicate (e.g. content/notes/2026-04-23-195800.md)'
        required: false
        default: ''

jobs:
  check:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_commit.author.name != 'github-actions[bot]')
    outputs:
      has_content: ${{ steps.diff.outputs.has_content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - id: diff
        run: |
          ORIG="${{ github.event.workflow_run.head_sha || github.sha }}"
          FILES=$(git diff --name-only ${ORIG}~1 ${ORIG} -- content/posts/ content/notes/ content/reading/)
          echo "has_content=$([ -n "$FILES" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  syndicate:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.has_content == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find new content and syndicate to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SPECIFIC_FILE="${{ github.event.inputs.file }}"
            if [ -n "$SPECIFIC_FILE" ]; then
              echo "Single file mode: $SPECIFIC_FILE"
              ALL_FILES="$SPECIFIC_FILE"
            else
              echo "No file specified"
              exit 0
            fi
          else
            ORIG="${{ github.event.workflow_run.head_sha || github.sha }}"
            FILES=$(git diff --name-only --diff-filter=A ${ORIG}~1 ${ORIG} -- 'content/posts/' 'content/notes/')
            READING_FILES=$(git diff --name-only --diff-filter=AM ${ORIG}~1 ${ORIG} -- 'content/reading/')
            ALL_FILES="$FILES $READING_FILES"
          fi

          if [ -z "$(echo $ALL_FILES | tr -d ' ')" ]; then
            echo "No new files"
            exit 0
          fi

          # Authenticate with Bluesky AT Protocol
          AUTH=$(curl -s -X POST "https://bsky.social/xrpc/com.atproto.server.createSession" \
            -H "Content-Type: application/json" \
            -d "{\"identifier\": \"${BLUESKY_HANDLE}\", \"password\": \"${BLUESKY_APP_PASSWORD}\"}")

          ACCESS_JWT=$(echo "$AUTH" | jq -r '.accessJwt // empty')
          DID=$(echo "$AUTH" | jq -r '.did // empty')

          if [ -z "$ACCESS_JWT" ]; then
            echo "Bluesky auth failed"
            echo "$AUTH"
            exit 1
          fi

          CHANGED=false

          for FILE in $ALL_FILES; do
            [ -f "$FILE" ] || continue

            # Skip if already has a Bluesky syndication URL
            if grep -q 'bsky.app' "$FILE"; then
              echo "Skipping $FILE - already syndicated to Bluesky"
              continue
            fi

            TITLE=$(sed -n 's/^title: *"\(.*\)"/\1/p' "$FILE" | head -1)
            SLUG=$(echo "$FILE" | sed 's|^content/||;s|\.md$|/|')
            URL="https://edleeman.co.uk/${SLUG}"

            if [[ "$FILE" == content/reading/* ]]; then
              SHELF=$(sed -n 's/^shelf: *"\(.*\)"/\1/p' "$FILE" | head -1)
              if [ "$SHELF" != "read" ]; then
                echo "Skipping $FILE - shelf is '$SHELF', not 'read'"
                continue
              fi
              AUTHOR=$(sed -n 's/^author: *"\(.*\)"/\1/p' "$FILE" | head -1)
              RATING=$(sed -n 's/^rating: *\([0-9]*\)/\1/p' "$FILE" | head -1)
              REVIEW=$(sed -n 's/^review: *"\(.*\)"/\1/p' "$FILE" | head -1)
              STARS=""
              if [ -n "$RATING" ] && [ "$RATING" -gt 0 ]; then
                for i in $(seq 1 "$RATING"); do STARS="${STARS}★"; done
                for i in $(seq "$RATING" 4); do STARS="${STARS}☆"; done
              fi
              HEADER="📚 \"${TITLE}\" by ${AUTHOR}"
              [ -n "$STARS" ] && HEADER="${HEADER} — ${STARS}"
              if [ -n "$REVIEW" ]; then
                TEXT=$(printf "%s\n\n%s\n\n%s" "$HEADER" "$REVIEW" "$URL")
              else
                TEXT=$(printf "%s\n\n%s" "$HEADER" "$URL")
              fi
            else
              # Notes: use body content (strip images/headings, first 5 lines)
              FULL_BODY=$(awk '/^---$/{c++;next} c>=2{print}' "$FILE")
              BODY=$(echo "$FULL_BODY" | sed 's/^#\+\s*//' | sed 's/!\[[^]]*\]([^)]*)//g' | sed 's/<https\?:[^>]*>//g' | sed '/^[[:space:]]*$/d' | head -5 | tr '\n' ' ' | sed 's/  */ /g;s/^ *//;s/ *$//')
              if [ -n "$BODY" ]; then
                TEXT=$(printf "%s\n\n%s" "$BODY" "$URL")
              else
                TEXT=$(printf "%s" "$URL")
              fi
            fi

            # Bluesky 300-byte limit — truncate prefix, keep URL intact at end
            URL_BYTES=$(printf '%s' "$URL" | wc -c)
            TEXT_BYTES=$(printf '%s' "$TEXT" | wc -c)
            if [ "$TEXT_BYTES" -gt 300 ]; then
              PREFIX_MAX=$((300 - URL_BYTES))
              TEXT_PREFIX=$(printf '%s' "$TEXT" | head -c "$PREFIX_MAX")
              TEXT="${TEXT_PREFIX}${URL}"
            fi

            # Byte offsets for clickable link facet (URL is always at end)
            TEXT_BYTES=$(printf '%s' "$TEXT" | wc -c)
            URL_BYTE_START=$((TEXT_BYTES - URL_BYTES))
            URL_BYTE_END=$TEXT_BYTES

            NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

            RESPONSE=$(curl -s -X POST "https://bsky.social/xrpc/com.atproto.repo.createRecord" \
              -H "Authorization: Bearer ${ACCESS_JWT}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg did "$DID" \
                --arg text "$TEXT" \
                --arg now "$NOW" \
                --argjson url_start "$URL_BYTE_START" \
                --argjson url_end "$URL_BYTE_END" \
                --arg url "$URL" \
                '{
                  "repo": $did,
                  "collection": "app.bsky.feed.post",
                  "record": {
                    ("$" + "type"): "app.bsky.feed.post",
                    "text": $text,
                    "createdAt": $now,
                    "facets": [
                      {
                        "index": {"byteStart": $url_start, "byteEnd": $url_end},
                        "features": [{"$type": "app.bsky.richtext.facet#link", "uri": $url}]
                      }
                    ]
                  }
                }')")

            POST_URI=$(echo "$RESPONSE" | jq -r '.uri // empty')
            POST_CID=$(echo "$RESPONSE" | jq -r '.cid // empty')

            if [ -n "$POST_URI" ]; then
              # Convert AT URI to web URL: at://did:plc:xxx/app.bsky.feed.post/rkey → https://bsky.app/profile/handle/post/rkey
              RKEY=$(echo "$POST_URI" | awk -F'/' '{print $NF}')
              BSKY_URL="https://bsky.app/profile/${BLUESKY_HANDLE}/post/${RKEY}"
              echo "Bluesky URL: $BSKY_URL"

              awk -v url="$BSKY_URL" '
                BEGIN { count=0; inserted=0 }
                /^syndication:/ {
                  print
                  inserted=1
                  next
                }
                inserted==1 && /^  - / {
                  print
                  next
                }
                inserted==1 && !/^  - / {
                  print "  - \"" url "\""
                  inserted=0
                  print
                  next
                }
                /^---$/ && count++==1 && inserted==0 {
                  print "syndication:"
                  print "  - \"" url "\""
                  print "---"
                  next
                }
                { print }
              ' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"

              CHANGED=true
            else
              echo "Warning: Bluesky post failed"
              echo "$RESPONSE"
            fi
          done

          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add content/
            git commit -m "Add syndication URLs from Bluesky"
            git push origin HEAD:master
          fi
